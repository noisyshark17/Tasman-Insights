<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" role="img" aria-label="Tasman insights – Energy and Environment">
  <title>Tasman insights</title>
  <defs>
    <!-- Globe base circle clip -->
    <clipPath id="globe-clip">
      <circle cx="40" cy="40" r="34"/>
    </clipPath>
    <!-- Radial gradient: lighter sky-blue in centre, deeper blue at edges -->
    <radialGradient id="globe-grad" cx="42%" cy="38%" r="60%">
      <stop offset="0%"  stop-color="#4fc8f0"/>
      <stop offset="60%" stop-color="#29abe2"/>
      <stop offset="100%" stop-color="#0072bc"/>
    </radialGradient>
  </defs>

  <!-- ── Globe ── -->
  <!-- Filled circle -->
  <circle cx="40" cy="40" r="34" fill="url(#globe-grad)"/>

  <!-- Horizontal latitude band stripes (navy dividers), clipped to circle -->
  <!-- Band 1 – top cap (dark navy) -->
  <rect x="6" y="6"  width="68" height="6"  fill="#1c2d48" clip-path="url(#globe-clip)"/>
  <!-- Band 2 -->
  <rect x="6" y="18" width="68" height="5"  fill="#1c2d48" clip-path="url(#globe-clip)"/>
  <!-- Band 3 -->
  <rect x="6" y="29" width="68" height="5"  fill="#1c2d48" clip-path="url(#globe-clip)"/>
  <!-- Band 4 -->
  <rect x="6" y="40" width="68" height="5"  fill="#1c2d48" clip-path="url(#globe-clip)"/>
  <!-- Band 5 -->
  <rect x="6" y="51" width="68" height="5"  fill="#1c2d48" clip-path="url(#globe-clip)"/>
  <!-- Band 6 -->
  <rect x="6" y="62" width="68" height="5"  fill="#1c2d48" clip-path="url(#globe-clip)"/>
  <!-- Bottom cap -->
  <rect x="6" y="68" width="68" height="8"  fill="#1c2d48" clip-path="url(#globe-clip)"/>

  <!-- ── Text ── -->
  <!-- "Tasman insights" – bold white -->
  <text
    x="92" y="48"
    font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-0.5"
  >Tasman insights</text>

  <!-- "ENERGY AND ENVIRONMENT" – thin white, wide tracking -->
  <text
    x="94" y="66"
    font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
    font-size="12"
    font-weight="300"
    fill="rgba(255,255,255,0.82)"
    letter-spacing="3.5"
  >ENERGY AND ENVIRONMENT</text>
</svg>